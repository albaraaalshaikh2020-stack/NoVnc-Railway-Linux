[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log
user=root

[program:xvfb]
command=/usr/bin/Xvfb :1 -screen 0 1280x720x24 -ac +extension GLX +render -noreset
autostart=true
autorestart=true
priority=10
startsecs=1

[program:x11vnc]
command=/usr/bin/x11vnc -display :1 -rfbauth /root/.vnc/passwd -forever -shared -rfbport 5900 -noxdamage -wait 5
autostart=true
autorestart=true
priority=20
startsecs=1

[program:fluxbox]
command=/usr/bin/fluxbox
environment=DISPLAY=":1",HOME="/root"
autostart=true
autorestart=true
priority=30
startsecs=1

[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --vnc localhost:5900 --listen %(ENV_PORT)s
autostart=true
autorestart=true
priority=40
startsecs=1
