[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:xvfb]
command=Xvfb :0 -screen 0 %(ENV_VNC_RESOLUTION)s x16
autorestart=true
priority=1

[program:fluxbox]
command=fluxbox
autorestart=true
priority=2
environment=DISPLAY=":0"

[program:x11vnc]
command=x11vnc -display :0 -nopw -listen 0.0.0.0 -xkb -ncache 10 -ncache_cr -forever -passwd %(ENV_VNC_PASS)s
autorestart=true
priority=3

[program:novnc]
command=websockify --web=/usr/share/novnc/ --cert=/etc/ssl/novnc.cert --key=/etc/ssl/novnc.key 0.0.0.0:%(ENV_PORT)s localhost:5900
autorestart=true
priority=4
